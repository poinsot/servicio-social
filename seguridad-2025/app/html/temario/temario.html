        <!-- Verifica Claves -->
        <script>
            let paginaId = null;
            let claveIngresada = null;

            document.addEventListener("DOMContentLoaded", function () {
                inicializarClaves();
                const urlParams = new URLSearchParams(window.location.search);
                paginaId = urlParams.has('paginaId') ? urlParams.get('paginaId') : null;
                if (paginaId) {
                    // Verifica si el usuario ya tiene acceso
                    if (tieneAcceso(paginaId)) {
                        // Redirige directamente si el acceso ya fue concedido
                        redirigirPagina(paginaId);
                    } else {
                        // Muestra el modal si no tiene acceso
                        let modalTarget = '';
                        switch (paginaId) {
                            case 'modulo1':
                                modalTarget = '#modal-1';
                                break;
                            case 'modulo2':
                                modalTarget = '#modal-2';
                                break;
                            case 'modulo3':
                                modalTarget = '#modal-3';
                                break;
                            case 'modulo4':
                                modalTarget = '#modal-4';
                                break;
                            case 'modulo5':
                                modalTarget = '#modal-5';
                                break;
                            case 'modulo6':
                                modalTarget = '#modal-6';
                                break;
                            case 'modulo7':
                                modalTarget = '#modal-7';
                                break;
                            case 'modulo8':
                                modalTarget = '#modal-8';
                                break;
                            case 'modulo9':
                                modalTarget = '#modal-9';
                                break;
                            case 'modulo10':
                                modalTarget = '#modal-10';
                                break;
                            default:
                                modalTarget = '';
                        }
                        $(modalTarget).modal('show');
                    }
                    // Ahora puedes usar paginaId en tus funciones
                    console.log("Página ID:", paginaId); // Solo para verificar
                    // Aquí puedes realizar cualquier acción adicional con paginaId
                }
            });

            function cargarPaginaId(button) {
                // Obtiene el data-pagina del botón
                if(!paginaId){
                    paginaId = button.dataset.pagina;
                }
                const modalTarget = button.dataset.target;

                // Verifica si el usuario ya tiene acceso
                if (paginaId && tieneAcceso(paginaId)) {
                    // Redirige directamente si el acceso ya fue concedido
                    redirigirPagina(paginaId);
                } else {
                    // Muestra el modal si no tiene acceso
                    $(modalTarget).modal('show');
                }
                // Ahora puedes usar paginaId en tus funciones
                if (paginaId) {
                    console.log("Pagina ID:", paginaId); // Solo para verificar
                    // Aquí puedes realizar cualquier acción adicional con paginaId
                }
                paginaId = null;
            }

            // Verifica si el usuario ya tiene acceso
            function verificarAcceso() {

                if (paginaId && tieneAcceso(paginaId)) {
                    document.getElementById("acceso").innerHTML = "<p>Acceso concedido previamente. Puedes ingresar directamente.</p>";
                    redirigirPagina(paginaId); // Redirige automáticamente si el acceso ya fue concedido
                }
            }

            // Función de verificación reutilizable
            function verificar(modalId, paginaId) {
                claveIngresada = document.getElementById(`claveIngresada-${modalId}`).value;
                console.log("Clave ingresada en Verificar:", claveIngresada); // Solo para verificar
                verificarClave(paginaId, claveIngresada);
                console.log("Claves de acceso guardadas:");
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith("clave_") || key.startsWith("acceso_")) {
                        console.log(`${key}: ${localStorage.getItem(key)}`);
                    }
                }
            }
            
        </script>
